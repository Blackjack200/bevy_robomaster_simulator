[package]
name = "daedalus"
version = "0.1.0"
edition = "2024"
default-run = "daedalus"

[features]
ros2 = ["dep:r2r"]
talos = ["dep:memmap2"]
default = ["talos"]

[dependencies]
bevy = { version = "0.17.3", features = ["dynamic_linking"] }
avian3d = "0.4.1"
bevy-inspector-egui = "=0.35.0"
rand = "0.9.2"
r2r = { version = "0.9.5", optional = true }
memmap2 = { version = "0.9", optional = true }
crossbeam-channel = "0.5.15"
image = "0.25.9"
egui = "0.33.2"
futures = "0.3"
exact = { path = "crates/exact" }
toml = "0.8"
notify = "7.0"
serde = { version = "1.0", features = ["derive"] }
